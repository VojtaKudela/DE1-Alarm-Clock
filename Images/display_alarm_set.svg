<svg width="640" height="180" viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="180" rx="8" fill="#151515" />
  <style>
    .on { fill: #ff1a1a; filter: drop-shadow(0 0 4px #ff0000); }
    .off { fill: #2a0505; }
    .label { fill: #555; font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; }
    .border { fill: none; stroke: #333; stroke-width: 2; rx: 5; }
  </style>
  <defs>
    <polygon id="h-seg" points="8,0 38,0 42,4 38,8 8,8 4,4" />
    <polygon id="v-seg" points="0,8 4,4 8,8 8,38 4,42 0,38" />
    <g id="digit_base">
      <use href="#h-seg" x="4" y="0"/><use href="#v-seg" x="42" y="4"/><use href="#v-seg" x="42" y="46"/><use href="#h-seg" x="4" y="84"/><use href="#v-seg" x="0" y="46"/><use href="#v-seg" x="0" y="4"/><use href="#h-seg" x="4" y="42"/><circle cx="55" cy="90" r="4.5" />
    </g>
  </defs>
  <g transform="translate(20,20)">
    <rect width="290" height="140" class="border" />
    <g transform="translate(15,20) skewX(-7)">
      <g transform="translate(0,0)"><use href="#digit_base" class="off"/><use href="#h-seg" x="4" y="0" class="on"/><use href="#v-seg" x="42" y="4" class="on"/><use href="#v-seg" x="42" y="46" class="on"/><use href="#v-seg" x="0" y="46" class="on"/><use href="#v-seg" x="0" y="4" class="on"/><use href="#h-seg" x="4" y="42" class="on"/></g>
      <g transform="translate(68,0)"><use href="#digit_base" class="off"/><use href="#v-seg" x="0" y="4" class="on"/><use href="#v-seg" x="0" y="46" class="on"/><use href="#h-seg" x="4" y="84" class="on"/></g>
      <g transform="translate(136,0)"><use href="#digit_base" class="off"/><use href="#h-seg" x="4" y="84" class="on"/></g>
      <g transform="translate(204,0)"><use href="#digit_base" class="off"/><use href="#v-seg" x="42" y="4" class="on"/><use href="#v-seg" x="42" y="46" class="on"/></g>
    </g>
  </g>
  <g transform="translate(330,20)">
    <rect width="290" height="140" class="border" />
    <g transform="translate(15,20) skewX(-7)">
      <g transform="translate(0,0)"><use href="#digit_base" class="off"/><use href="#h-seg" x="4" y="0" class="on"/><use href="#v-seg" x="42" y="4" class="on"/><use href="#v-seg" x="42" y="46" class="on"/><use href="#h-seg" x="4" y="84" class="on"/><use href="#v-seg" x="0" y="46" class="on"/><use href="#v-seg" x="0" y="4" class="on"/></g>
      <g transform="translate(68,0)"><use href="#digit_base" class="off"/><use href="#h-seg" x="4" y="0" class="on"/><use href="#v-seg" x="0" y="4" class="on"/><use href="#h-seg" x="4" y="42" class="on"/><use href="#v-seg" x="0" y="46" class="on"/><use href="#v-seg" x="42" y="46" class="on"/><use href="#h-seg" x="4" y="84" class="on"/><circle cx="55" cy="90" r="4.5" class="on"/></g>
      <g transform="translate(136,0)"><use href="#digit_base" class="off"/><use href="#h-seg" x="4" y="0" class="on"/><use href="#v-seg" x="42" y="4" class="on"/><use href="#v-seg" x="42" y="46" class="on"/><use href="#h-seg" x="4" y="84" class="on"/><use href="#v-seg" x="0" y="46" class="on"/><use href="#v-seg" x="0" y="4" class="on"/></g>
      <g transform="translate(204,0)"><use href="#digit_base" class="off"/><use href="#h-seg" x="4" y="0" class="on"/><use href="#v-seg" x="42" y="4" class="on"/><use href="#v-seg" x="42" y="46" class="on"/><use href="#h-seg" x="4" y="84" class="on"/><use href="#v-seg" x="0" y="46" class="on"/><use href="#v-seg" x="0" y="4" class="on"/></g>
    </g>
  </g>
</svg>
